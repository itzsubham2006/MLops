name : CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Set up python 
      uses: actions/set-up python@v2
      with: 
        python-version: '3.10'

    - name: Install dependecies
      run: |
          python -m pip install --upgrade pip
          pip install pytest streamlt

    - name: Run tests
      run: |
          pytest test.py